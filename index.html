<!DOCTYPE html>
<html>
<head>
<title>Rideshare System</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* center wrapper */
.container{
    text-align:center;
}

.box{
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
    width:380px;
}

.hidden{ display:none; }

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

input{
    padding:10px;
    width:200px;
}
a{
    display:inline-block;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 Rideshare System</h2>

<!-- PAGE 1 -->
<div id="page1" class="box">

    <h3>Select Plan</h3>

    <button onclick="goPage2(30,5)">30 Min - $5</button>
    <button onclick="goPage2(60,10)">1 Hour - $10</button>

</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden box">

    <h3>💳 Payment</h3>

    <p id="priceText"></p>

    <!-- VENMO -->
    <p>📱 Venmo</p>
    <img width="140"
    src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://venmo.com/u/manik0010175">
    <br>
    <a href="https://venmo.com/u/manik0010175" target="_blank">Open Venmo</a>

    <hr>

    <!-- CASH APP -->
    <p>📱 Cash App</p>
    <img width="140"
    src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://cash.app/$habibhabibhadhh">
    <br>
    <a href="https://cash.app/$habibhabibhadhh" target="_blank">Open Cash App</a>

    <hr>

    <h3>🔑 PIN</h3>
    <input type="text" id="pinInput" placeholder="Enter PIN">
    <br>
    <button onclick="checkPin()">Enter</button>

    <p id="msg"></p>

</div>

<!-- PAGE 3 -->
<div id="page3" class="hidden box">

    <h2>Welcome 🎉</h2>

    <p>🚗 Ride Active</p>

    <hr>

    <!-- YOUTUBE APP LINK -->
    <h3>YouTube</h3>
    <a href="https://www.youtube.com" target="_blank">
        <button>Open YouTube App</button>
    </a>

    <hr>

    <!-- MAP -->
    <h3>Google Map</h3>
    <iframe width="320" height="180"
    src="https://maps.google.com/maps?q=New York&output=embed"></iframe>

    <hr>

    <!-- WAZE -->
    <h3>Waze Map</h3>
    <iframe width="320" height="180"
    src="https://embed.waze.com/iframe?zoom=12&lat=40.7128&lon=-74.0060">
    </iframe>

</div>

</div>

<script>

let correctPin = "";
let price = 0;

/* PAGE CONTROL */
function showPage(n){

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="none";
    document.getElementById("page3").style.display="none";

    document.getElementById("page"+n).style.display="block";
}

showPage(1);

/* PLAN */
function goPage2(min,p){

    price = p;
    correctPin = (min === 30) ? "R1230" : "RIDE60";

    document.getElementById("priceText").innerText =
        "💰 Pay $" + price;

    showPage(2);
}

/* PIN CHECK */
function checkPin(){

    let pin = document.getElementById("pinInput").value.trim();

    if(pin === correctPin){
        showPage(3);
    } else {
        document.getElementById("msg").innerText =
            "❌ Wrong PIN!";
    }
}

</script>

</body>
</html>
